
[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "thurstone"
version = "0.0.1"
description = "OO toolkit for lattice-based performance models and the horse-race inverse problem"
authors = [{name="You", email="you@example.com"}]
readme = "README.md"
requires-python = ">=3.9"
dependencies = ["numpy>=1.23"]

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "numpy>=1.23",
    "hypothesis>=6.0",
    "pytest-benchmark>=4.0",
]

[tool.maturin]
features = ["pyo3/extension-module"]

[tool.pytest.ini_options]
addopts = "-q -ra"
testpaths = ["tests"]
